[window]
startup_mode = "Maximized"
opacity = 0.85

[font.normal]
family = "SauceCodePro Nerd Font Mono"
style = "Regular"

[font]
size = 16.0

[terminal.shell]
program = "/usr/local/bin/zsh"

[cursor.style]
shape = "Block"
blinking = "Always"

[selection]
save_to_clipboard = true

[colors.primary]
background = "#08080b"
foreground = "#787c99"

[colors.cursor]
cursor = "#787c99"

[colors.selection]
text = "CellForeground"
background = "#515c7e"

[colors.normal]
black = "#363b54"
red = "#f7768e"
green = "#41a6b5"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#787c99"

[colors.bright]
black = "#363b54"
red = "#f7768e"
green = "#41a6b5"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#787c99"
